name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-dinamis/**'
      - '.github/workflows/deploy-web-dinamis.yml'

jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Path
        run: |
          echo "Lokasi saat ini:"
          pwd
          echo "Isi folder saat ini:"
          ls -F
          echo "Isi folder web-dinamis:"
          ls -F web-dinamis/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          # Tambah tag dengan commit SHA agar lebih traceable
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_uas_040:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_uas_040:${{ github.sha }}

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis_uas_040
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup old containers on EC2
        uses: appleboy/ssh-action@v1.0.3  # Pakai versi tetap
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            # Gunakan nama image yang konsisten
            docker rm -f web-dinamis_uas_040 || true
            
            # Turunkan compose jika folder ada
            if [ -d "/home/ubuntu/container-dinamis/web-dinamis_uas_040" ]; then
              cd /home/ubuntu/container-dinamis/web-dinamis_uas_040
              docker compose down || true
            fi
            
            # Buat folder target jika belum ada
            mkdir -p /home/ubuntu/container-dinamis/web-dinamis_uas_040

      - name: Copy Compose file to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7  # Pakai versi tetap
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          source: "web-dinamis/docker-compose.yml,web-dinamis/db_data/uas40.sql"
          target: "/home/ubuntu/container-dinamis/web-dinamis_uas_040"
          strip_components: 1  # hasil: target/docker-compose.yml & target/db_data/uas40.sql

      - name: Deploy Web Dinamis via SSH
        uses: appleboy/ssh-action@v1.0.3  # Versi konsisten
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/container-dinamis/web-dinamis_uas_040
            
            # Export variable dengan benar
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            
            # Pull image terbaru lalu jalankan
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Verifikasi container berjalan
            echo "=== Status Container ==="
            docker compose ps