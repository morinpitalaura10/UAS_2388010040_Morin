name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-dinamis/**'
      - '.github/workflows/deploy-web-dinamis.yml'
  workflow_dispatch:

jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_uas_040:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Web Dinamis via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            COMPOSE_PATH=""
            for path in $(find /home/ubuntu /home -name "docker-compose.yml" 2>/dev/null); do
              dir=$(dirname "$path")
              if git -C "$dir" remote get-url origin 2>/dev/null | grep -q "UAS_2388010040_Morin"; then
                COMPOSE_PATH="$path"
                break
              fi
            done
            if [ -z "$COMPOSE_PATH" ]; then
              COMPOSE_PATH=$(find /home/ubuntu -name "docker-compose.yml" 2>/dev/null | head -n 1)
            fi
            if [ -z "$COMPOSE_PATH" ]; then
              COMPOSE_PATH=$(find /home -name "docker-compose.yml" 2>/dev/null | head -n 1)
            fi
            if [ -z "$COMPOSE_PATH" ]; then
              echo "Error: docker-compose.yml not found"
              exit 1
            fi
            COMPOSE_DIR=$(dirname "$COMPOSE_PATH")
            cd "$COMPOSE_DIR"
            echo "Compose directory: $(pwd)"
            # Find git root (might be parent of compose dir)
            GIT_ROOT=$(git -C "$COMPOSE_DIR" rev-parse --show-toplevel 2>/dev/null || echo "$COMPOSE_DIR")
            echo "Git root: $GIT_ROOT"
            # Update Git repository from the git root
            cd "$GIT_ROOT"
            git pull origin main || (git fetch origin main && git reset --hard origin/main)
            # Go back to compose directory
            cd "$COMPOSE_DIR"
            
            # Setup public deploy log file
            touch deploy.log
            chmod 666 deploy.log
            echo "=== Deployment Log: $(date) ===" > deploy.log

            # Pull latest docker image
            echo "Pulling latest image..." | tee -a deploy.log
            sudo docker pull 1005morinpitalaura/web-dinamis_uas_040:latest 2>&1 | tee -a deploy.log
            # Recreate all containers
            echo "Starting docker compose..." | tee -a deploy.log
            sudo DOCKERHUB_USERNAME=1005morinpitalaura docker compose up -d --force-recreate 2>&1 | tee -a deploy.log
            # Clean up old images
            sudo docker image prune -af 2>&1 | tee -a deploy.log
            # Wait for DB container to be ready
            echo "Waiting 15s for database to be ready..." | tee -a deploy.log
            sleep 15
            # Reset database: copy SQL into container, then import
            DB_CONTAINER=$(sudo docker compose ps -q db-webdinamis)
            SQL_FILE="db_data/db_uas040.sql"
            echo "DB container ID: $DB_CONTAINER" | tee -a deploy.log
            echo "Looking for SQL file at: $(pwd)/$SQL_FILE" | tee -a deploy.log
            
            if [ -n "$DB_CONTAINER" ] && [ -f "$SQL_FILE" ]; then
              echo "Resetting and importing database..." | tee -a deploy.log
              sudo docker cp "$SQL_FILE" "$DB_CONTAINER":/tmp/db_uas040.sql 2>&1 | tee -a deploy.log
              
              STATUS=0
              sudo docker exec "$DB_CONTAINER" mysql -u root -p'password!123' -e "DROP DATABASE IF EXISTS db_uas040; CREATE DATABASE db_uas040;" 2>&1 | tee -a deploy.log || STATUS=1
              sudo docker exec "$DB_CONTAINER" mysql -u root -p'password!123' db_uas040 -e "source /tmp/db_uas040.sql" 2>&1 | tee -a deploy.log || STATUS=1
              sudo docker exec "$DB_CONTAINER" mysql -u root -p'password!123' -e "GRANT ALL PRIVILEGES ON db_uas040.* TO 'MorinUAS'@'%' IDENTIFIED BY 'UAS123'; FLUSH PRIVILEGES;" 2>&1 | tee -a deploy.log || STATUS=1
              
              if [ $STATUS -eq 0 ]; then
                echo "Database imported successfully!" | tee -a deploy.log
              else
                echo "ERROR: Database commands failed" | tee -a deploy.log
                exit 1
              fi
            else
              echo "ERROR: DB container='$DB_CONTAINER', SQL file exists=$([ -f '$SQL_FILE' ] && echo yes || echo no)" | tee -a deploy.log
              ls -la db_data/ 2>&1 | tee -a deploy.log
              exit 1
            fi
            echo "=== Container Status ===" | tee -a deploy.log
            sudo docker ps 2>&1 | tee -a deploy.log