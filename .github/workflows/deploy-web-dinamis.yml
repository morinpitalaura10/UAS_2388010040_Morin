name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-dinamis/**'
      - '.github/workflows/deploy-web-dinamis.yml'
  workflow_dispatch:

jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_uas_040:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis
    steps:
      - name: Deploy Web Dinamis via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            COMPOSE_PATH=$(find /home/ubuntu -name "docker-compose.yml" 2>/dev/null | head -n 1)
            if [ -z "$COMPOSE_PATH" ]; then
              COMPOSE_PATH=$(find /home -name "docker-compose.yml" 2>/dev/null | head -n 1)
            fi
            if [ -n "$COMPOSE_PATH" ]; then
              cd $(dirname "$COMPOSE_PATH")
              echo "Deploying in directory: $(pwd)"
            else
              echo "Error: docker-compose.yml not found"
              exit 1
            fi
            # Update Git repository on the EC2 server
            git fetch origin main
            git reset --hard origin/main
            # Pull latest docker image
            sudo docker pull 1005morinpitalaura/web-dinamis_uas_040:latest
            # Recreate Next.js container
            sudo DOCKERHUB_USERNAME=1005morinpitalaura docker compose up -d --force-recreate --no-deps container-dinamis
            # Clean up old images
            sudo docker image prune -af
            # Reset database and import latest SQL script
            echo "Resetting and importing database on EC2..."
            sudo docker compose exec -T db-webdinamis mysql -u root -p'password!123' -e "DROP DATABASE IF EXISTS db_uas040; CREATE DATABASE db_uas040;"
            sudo docker compose exec -T db-webdinamis mysql -u root -p'password!123' db_uas040 < db_data/db_uas040.sql
            echo "=== Status ==="
            sudo docker ps