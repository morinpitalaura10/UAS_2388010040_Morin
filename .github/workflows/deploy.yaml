name: Deploy Web Statis to AWS EC2
on:
  push:
    branches: [ main ]
    paths:
      - 'web-statis/**'
      - '.github/workflows/deploy.yaml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-statis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/uas_2388010040_morin:latest
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to EC2 via SSH and run docker compose
    steps:
    - name: SSH and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          sudo docker rm -f uas_2388010040_morin || true
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/uas_2388010040_morin:latest
          sudo docker run -d --name uas_2388010040_morin -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/uas_2388010040_morin:latest