name: Deploy Web Statis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-statis/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web Statis image
        uses: docker/build-push-action@v5
        with:
          context: ./web-statis
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uas_2388010040_morin:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Web Statis via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/container-dinamis/uasweb-dinamis
            docker pull 1005morinpitalaura/uas_2388010040_morin:latest
            DOCKERHUB_USERNAME=1005morinpitalaura docker compose up -d --force-recreate --no-deps container-statis
            docker image prune -af
            echo "=== Status ==="
            docker ps