services:

  db-webdinamis:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: db_uas040
      MARIADB_USER: MorinUAS
      MARIADB_PASSWORD: UAS123
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/db_uas040.sql:/docker-entrypoint-initdb.d/db_uas040.sql
