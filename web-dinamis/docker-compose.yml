    restart: always
    environment:
      DB_HOST: db-webdinamis
      DB_USER: MorinUAS
      DB_PASSWORD: UAS123
      DB_NAME: db_uas040
      NEXTAUTH_URL: http://54.251.214.196:3000
      NEXTAUTH_SECRET: superrahasiabanget12345678901234
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}